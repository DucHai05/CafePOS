spring.datasource.url=jdbc:mysql://localhost:3306/ban_khuvuc_service
spring.datasource.username=root
spring.datasource.password=123456
# 1. Ép Hibernate giữ nguyên tên cột (không tự thêm dấu gạch dưới _)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 2. Tự động cập nhật bảng nếu thiếu cột hoặc sai cấu trúc
spring.jpa.hibernate.ddl-auto=update

# 3. (Tùy chọn) Hiện câu lệnh SQL ra Console để dễ debug
spring.jpa.show-sql=true